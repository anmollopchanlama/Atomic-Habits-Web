{% extends 'base.html' %}

{% block title %}Edit Habit{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/habits.css') }}">
{% endblock %}

{% block content %}
<div class="habits-container">
    <div class="habit-form">
        <h2>Update Habit</h2>
        <form action="{{ url_for('auth.edit_habit', habit_id=habit.id) }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ session['csrf_token'] }}">
            <input type="text" name="habitName" value="{{ habit.name }}" required>
            <input type="text" name="habitIdentity" value="{{ habit.identity }}">
            <input type="text" name="habitIcon" value="{{ habit.icon }}">
            <button type="submit">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}

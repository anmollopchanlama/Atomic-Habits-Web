<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1A1612;
            --cream: #F5F0E8;
            --gold: #C9A84C;
            --rust: #B85C38;
            --paper: #EDE8DC;
            --brown: #8B6F47;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--ink);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 48px 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 56px;
            animation: fadeUp 0.6s ease forwards;
            opacity: 0;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            letter-spacing: -0.02em;
        }

        .logout {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(245,240,232,0.4);
            text-decoration: none;
            border: 1px solid rgba(245,240,232,0.1);
            padding: 10px 20px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .logout:hover {
            border-color: var(--rust);
            color: var(--rust);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(245,240,232,0.04);
            border: 1px solid rgba(245,240,232,0.08);
            border-radius: 8px;
            padding: 28px;
            animation: fadeUp 0.6s ease forwards;
            opacity: 0;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }

        .stat-label {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(245,240,232,0.35);
            margin-bottom: 12px;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            color: var(--cream);
            letter-spacing: -0.02em;
        }

        .stat-value.gold { color: var(--gold); }
        .stat-value.rust { color: var(--rust); }

        .section-title {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(245,240,232,0.3);
            margin-bottom: 16px;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            animation: fadeUp 0.6s 0.4s ease forwards;
            opacity: 0;
        }

        .users-table th {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(245,240,232,0.3);
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(245,240,232,0.06);
        }

        .users-table td {
            font-size: 13px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(245,240,232,0.05);
            color: rgba(245,240,232,0.7);
        }

        .users-table tr:hover td {
            background: rgba(245,240,232,0.03);
        }

        .badge {
            display: inline-block;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .badge.admin { background: rgba(201,168,76,0.15); color: var(--gold); }
        .badge.user  { background: rgba(184,92,56,0.15);  color: var(--rust); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <span class="eyebrow">Admin Panel</span>
            <h1>Dashboard</h1>
        </div>
        <a href="/login" class="logout">Logout</a>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <p class="stat-label">Total Users</p>
            <p class="stat-value gold" id="totalUsers">2</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Active Habits</p>
            <p class="stat-value">14</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Avg Streak</p>
            <p class="stat-value rust">7d</p>
        </div>
    </div>

    <p class="section-title">Registered Users</p>
    <table class="users-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Username</th>
                <th>Role</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <tr>
                <td>1</td>
                <td>admin</td>
                <td><span class="badge admin">admin</span></td>
            </tr>
            <tr>
                <td>2</td>
                <td>john</td>
                <td><span class="badge user">user</span></td>
            </tr>
        </tbody>
    </table>

    <script>
        // Animate stat numbers counting up
        document.querySelectorAll('.stat-value').forEach(el => {
            const target = parseInt(el.textContent);
            if (isNaN(target)) return;
            let count = 0;
            const step = Math.ceil(target / 30);
            const timer = setInterval(() => {
                count = Math.min(count + step, target);
                el.textContent = count;
                if (count >= target) clearInterval(timer);
            }, 40);
        });
    </script>

</body>
</html>
